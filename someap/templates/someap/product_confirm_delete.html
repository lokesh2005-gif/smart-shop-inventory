{% extends 'someap/base.html' %}

{% block content %}
  <div class="box" style="max-width: 500px; margin: auto;">
    <h1 class="title has-text-danger">Delete Product</h1>
    <p class="mb-4">Are you sure you want to delete <strong>{{ object.name }}</strong>? This action cannot be undone.</p>

    <form method="post">
      {% csrf_token %}
      <div class="field is-grouped">
        <div class="control">
          <button class="button is-danger" type="submit">
            <span class="icon"><i class="fas fa-trash"></i></span>
            <span>Yes, delete</span>
          </button>
        </div>
        <div class="control">
          <a class="button is-light" href="{% url 'someap:product_list' %}">
            <span class="icon"><i class="fas fa-arrow-left"></i></span>
            <span>Cancel</span>
          </a>
        </div>
      </div>
    </form>
  </div>
{% endblock %}
